# Fly.io configuration for Anvil blockchain
app = 'pagine-azzurre-blockchain'
primary_region = 'fra'  # Frankfurt, close to Italy

[build]

[env]
  MNEMONIC = "test test test test test test test test test test test junk"

[http_service]
  internal_port = 8545
  force_https = true
  auto_stop_machines = 'off'  # Keep blockchain always running
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'anvil_data'
  destination = '/data'
  initial_size = '1gb'

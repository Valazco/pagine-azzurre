services:
  validator1:
    image: hyperledger/besu:latest
    container_name: validator1
    hostname: validator1
    command:
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/keys/key
      - --data-path=/data
      - --min-gas-price=0
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,WEB3,QBFT,ADMIN,DEBUG,TXPOOL
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --rpc-ws-enabled
      - --rpc-ws-api=ETH,NET,WEB3
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --host-allowlist=*
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --nat-method=DOCKER
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - ./keys/validator1/key:/keys/key:ro
      - validator1_data:/data
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
    networks:
      besu-network:
        ipv4_address: 172.16.239.11

  validator2:
    image: hyperledger/besu:latest
    container_name: validator2
    hostname: validator2
    command:
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/keys/key
      - --data-path=/data
      - --min-gas-price=0
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,WEB3,QBFT
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --host-allowlist=*
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --nat-method=DOCKER
      - --bootnodes=enode://09b02f8a5fddd222ade4ea4528faefc399623af3f736be3c44f03e2df22fb792f3931a4d9573d333ca74343305762a753388c3422a86d98b713fc91c1ea04842@172.16.239.11:30303
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - ./keys/validator2/key:/keys/key:ro
      - validator2_data:/data
    networks:
      besu-network:
        ipv4_address: 172.16.239.12

  validator3:
    image: hyperledger/besu:latest
    container_name: validator3
    hostname: validator3
    command:
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/keys/key
      - --data-path=/data

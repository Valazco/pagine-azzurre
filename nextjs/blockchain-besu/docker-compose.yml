        ipv4_address: 172.16.239.13

  validator4:
    image: hyperledger/besu:latest
    container_name: validator4
    hostname: validator4
    command:
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/keys/key
      - --data-path=/data

# fly.toml - Hyperledger Besu deployment for Pagine Azzurre

app = 'pagine-azzurre-blockchain'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8545
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'besu_data'
  destination = '/data'

[checks]
  [checks.health]
    port = 8545
    type = "http"
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "POST"
    path = "/"
    headers = { "Content-Type" = "application/json" }
    body = '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'

[env]
  BESU_OPTS = "-Xmx512m"
